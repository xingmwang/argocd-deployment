apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-demo-guestbook
  namespace: argocd
spec:
  project: team-demo

  source:
    repoURL: "https://github.com/argoproj/argocd-example-apps.git"
    targetRevision: HEAD
    path: guestbook

  destination:
    server: https://kubernetes.default.svc
    namespace: team-demo-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-example-app    # CHANGE: unique app name
  namespace: argocd
spec:
  project: devops             # CHANGE: must match project.yaml name

  source:
    repoURL: "https://github.com/argoproj/argocd-example-apps.git"  # CHANGE
    targetRevision: HEAD
    path: "guestbook"         # CHANGE: path to manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-dev     # CHANGE: must match allowed namespace prefix

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-example-backend-api
  namespace: argocd
spec:
  project: team-example

  source:
    repoURL: "https://github.com/your-org/team-example-configs.git"
    targetRevision: HEAD
    path: "backend-api/overlays/dev"

  destination:
    server: https://kubernetes.default.svc
    namespace: team-example-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

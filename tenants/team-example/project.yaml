apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-example
  namespace: argocd
spec:
  description: "Example tenant team - reference implementation"

  sourceRepos:
    - "https://github.com/your-org/team-example-*"

  destinations:
    - namespace: "team-example-*"
      server: https://kubernetes.default.svc

  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: "apps"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "*"
    - group: "autoscaling"
      kind: "*"

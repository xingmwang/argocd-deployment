name: Lint & Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: relaxed
            rules:
              line-length: disable

      - name: Helm dependency update
        run: helm dependency update platform/

      - name: Helm template (dev)
        run: |
          helm template test platform/ \
            -f platform/values/base.yaml \
            -f platform/values/overlays/dev.yaml

      - name: Helm template (prod)
        run: |
          helm template test platform/ \
            -f platform/values/base.yaml \
            -f platform/values/overlays/prod.yaml

      - name: Validate tenants
        run: ./scripts/validate.sh

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

## Git repository URL (change to your repo)
repoURL: "https://github.com/xingmwang/argocd-deployment.git"
targetRevision: HEAD

## Argo CD namespace (change if deploying to non-default namespace)
argoNamespace: "argocd"

## Destination cluster (default: in-cluster)
destinationServer: "https://kubernetes.default.svc"

## Active extensions (add entries here to enable)
extensions: []
  # - name: image-updater
  #   path: extensions/image-updater

## Active tenants (auto-populated by onboard-tenant.sh)
tenants:
  - name: devops
    path: tenants/devops

## Git repository URL (本仓库地址)
repoURL: "https://github.com/xingmwang/argocd-deployment.git"
targetRevision: HEAD

## Argo CD namespace
argoNamespace: "argocd"

## Destination cluster (in-cluster)
destinationServer: "https://kubernetes.default.svc"

## Tenants - 每个 tenant 一个条目
## 新增 tenant 只需在此添加条目，然后创建 tenants/{name}/apps/ 目录
tenants:
  - name: example
    namespace: example
    path: tenants/example
    sourceRepos:
      - "https://github.com/argoproj/argocd-example-apps.git"

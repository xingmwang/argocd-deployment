{{- /*
  Root Application - manages itself (bootstrap self-management)
*/ -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: {{ .Values.argoNamespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: bootstrap
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: {{ .Values.destinationServer }}
    namespace: {{ .Values.argoNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- /* Generate one Application per extension */ -}}
{{- range .Values.extensions }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ext-{{ .name }}
  namespace: {{ $.Values.argoNamespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: {{ $.Values.repoURL }}
    targetRevision: {{ $.Values.targetRevision }}
    path: {{ .path }}
  destination:
    server: {{ $.Values.destinationServer }}
    namespace: {{ $.Values.argoNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
{{- end }}
{{- /* Generate one Application per tenant (syncs their project + apps) */ -}}
{{- range .Values.tenants }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-{{ .name }}
  namespace: {{ $.Values.argoNamespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: {{ $.Values.repoURL }}
    targetRevision: {{ $.Values.targetRevision }}
    path: {{ .path }}
    directory:
      recurse: true
  destination:
    server: {{ $.Values.destinationServer }}
    namespace: {{ $.Values.argoNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
{{- end }}

## Apply this file ONCE to bootstrap the App-of-Apps root.
## After this, Argo CD manages itself via the root Application.
##
## Usage: kubectl apply -f bootstrap/static/install-bootstrap.yaml -n argocd
##
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: "https://github.com/your-org/argocd-deployment.git"  # CHANGE THIS
    targetRevision: HEAD
    path: bootstrap
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
